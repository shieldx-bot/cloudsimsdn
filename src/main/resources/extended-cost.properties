# Deployment Cost (one-time)
deployment.cost=500.0

# Operational Cost (per prediction cycle)
cpu.cost.per.vcpu.hour=0.05
memory.cost.per.gb.hour=0.01
bw.cost.per.gb.hour=0.02

# Energy Model
energy.price.per.kwh=0.10
host.power.idle.watts=120.0
host.power.max.watts=274.0
host.peak.cpu.util=1.0

# Scaling Cost
scale.up.cpu.cost.per.vcpu=0.10
scale.up.mem.cost.per.gb=0.05
migration.cost.fixed=50.0
migration.cost.per.vm=25.0
scale.down.cost.fixed=5.0

# Fault Penalties (mirror of FaultCostModel defaults)
full.cost.bridge-byte-streak=200.0
